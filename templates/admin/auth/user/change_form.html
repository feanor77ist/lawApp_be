{% extends "admin/change_form.html" %}
{% load i18n admin_urls static admin_modify %}

{% block extrahead %}
{{ block.super }}
<style>
.send-welcome-email-link {
    white-space: nowrap;
    font-size: 13px;
    padding: 8px 12px;
    display: inline-block;
}

@media (max-width: 768px) {
    .send-welcome-email-link {
        font-size: 11px;
        padding: 6px 8px;
    }
    
    .object-tools li {
        margin-bottom: 4px;
    }
    
    .object-tools {
        margin-bottom: 10px;
    }
}

@media (max-width: 480px) {
    .send-welcome-email-link {
        font-size: 10px;
        padding: 5px 6px;
    }
}
</style>
{% endblock %}

{% block object-tools-items %}
{{ block.super }}
{% if show_send_email_button and original %}
<li>
    <a href="{% url 'admin:auth_user_send_welcome_email' original.pk %}" class="send-welcome-email-link" title="Hoş geldiniz e-postası gönder">
        📧 Hoş Geldiniz
    </a>
</li>
{% endif %}
{% endblock %}
